    <!-- Bottom pattern -->
    <rect x="98" y="192" width="44" height="8" fill="#111"/>
    <rect x="98" y="204" width="44" height="8" fill="#111"/>
    <rect x="178" y="192" width="10" height="20" fill="#c3152a"/>
    <rect x="192" y="192" width="10" height="20" fill="#c3152a"/>
    <rect x="206" y="192" width="10" height="20" fill="#c3152a"/>

    <text x="160" y="276" text-anchor="middle" fill="url(#gold)" font-family="Georgia,serif" font-size="22" font-weight="700">NAIOSH Law</text>
    <circle cx="72" cy="265" r="5" fill="url(#gold)"/>
    <circle cx="248" cy="265" r="5" fill="url(#gold)"/>

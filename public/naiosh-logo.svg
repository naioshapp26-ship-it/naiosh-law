      <rect x="118" y="76" width="12" height="10"/><rect x="136" y="76" width="12" height="10"/>
      <rect x="154" y="76" width="12" height="10"/><rect x="172" y="76" width="12" height="10"/>
      <rect x="190" y="76" width="12" height="10"/>
    </g>
    <!-- Law box -->
    <rect x="98" y="112" width="58" height="34" rx="3" fill="#111"/>
    <text x="127" y="135" text-anchor="middle" fill="url(#gold)" font-family="Georgia,serif" font-size="16" font-weight="700">Law</text>
    <!-- Red bars right -->
    <rect x="178" y="112" width="10" height="34" fill="#c3152a"/>
    <rect x="192" y="112" width="10" height="34" fill="#c3152a"/>
    <rect x="206" y="112" width="10" height="34" fill="#c3152a"/>

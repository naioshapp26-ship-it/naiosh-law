    <path fill="url(#gold)" d="M72 58h176c8 0 14 6 14 14v118c0 62-44 108-102 132-58-24-102-70-102-132V72c0-8 6-14 14-14z"/>
    <path fill="url(#shieldBg)" d="M84 70h152c4 0 8 4 8 8v104c0 50-36 88-84 108-48-20-84-58-84-108V78c0-4 4-8 8-8z"/>

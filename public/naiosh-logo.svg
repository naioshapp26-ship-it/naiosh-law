      <ellipse cx="22" cy="78" rx="28" ry="8"/>
      <path d="M0 20h44v6H0z"/>
      <ellipse cx="22" cy="12" rx="22" ry="7"/>
    </g>
    <!-- Right scale -->
    <g fill="url(#gold)" transform="translate(254,95) scale(-1,1)">
      <path d="M18 0h8v70h-8z"/>
      <ellipse cx="22" cy="78" rx="28" ry="8"/>
      <path d="M0 20h44v6H0z"/>
      <ellipse cx="22" cy="12" rx="22" ry="7"/>
    </g>
